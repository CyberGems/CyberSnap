name: Build and Release CyberSnap

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Dependencies
        run: dotnet restore CyberSnap.sln

      - name: Build Solution
        run: dotnet build CyberSnap.sln --configuration Release --no-restore

      - name: Publish Win-x64 Self-Contained Exe
        run: |
          dotnet publish src/CyberSnap/CyberSnap.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o ./publish-win64

      - name: Zip Published Output
        shell: powershell
        run: |
          Compress-Archive -Path ./publish-win64/* -DestinationPath ./CyberSnap-${{ github.ref_name }}-Portable-win-x64.zip

      - name: Compile Inno Setup Installer
        shell: powershell
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion="${{ github.ref_name }}" CyberSnap.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            ./CyberSnap-${{ github.ref_name }}-Portable-win-x64.zip
            ./CyberSnap-Setup-${{ github.ref_name }}.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
